# ╔══════════════════════════════════════════════════════════════╗
# ║  Zenith Alacritty Config                                    ║
# ║                                                             ║
# ║  Design:                                                    ║
# ║  • Generous padding → content breathes, feels spacious      ║
# ║  • No title bar → maximum immersion, zero distraction       ║
# ║  • Slight opacity → depth without blur noise                ║
# ║  • Optimized font size → readable without squinting         ║
# ╚══════════════════════════════════════════════════════════════╝

[general]
import = [
    "~/.config/alacritty/catppuccin-mocha.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding = { x = 14, y = 12 }    # Breathing room — not cramped, not wasteful
decorations = "buttonless"
opacity = 0.97                   # Barely transparent — adds depth, stays readable
blur = false
option_as_alt = "Both"
startup_mode = "Maximized"       # Start big — own the screen, own the work

[font]
size = 19.0                      # Slightly smaller than 20 — fits more code, still comfortable
normal  = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold    = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic  = { family = "JetBrainsMono Nerd Font", style = "Italic" }

[font.offset]
x = 0
y = 2                            # Slight extra line spacing — easier to scan code

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600             # Calm blink — not frantic, not dead
blink_timeout = 0                # Never stop — always know where you are

[scrolling]
history = 10000                  # Generous scrollback

[selection]
save_to_clipboard = true         # Select = copy. Less friction.

[keyboard]
bindings = [
    # Tmux splits (Prefix = Ctrl+Space = \x00)
    { key = "D",     mods = "Command",              chars = "\u0000%" },
    { key = "D",     mods = "Command|Shift",         chars = "\u0000\"" },

    # Pane/Window management
    { key = "W",     mods = "Command",              chars = "\u0000x" },
    { key = "W",     mods = "Command|Shift",         chars = "\u0000&" },
    { key = "Y",     mods = "Command",              chars = "\u0000c" },

    # Tmux navigation
    { key = "P",     mods = "Command",              chars = "\u0000w" },
    { key = "P",     mods = "Command|Shift",         chars = "\u0000s" },
    { key = "O",     mods = "Command",              chars = "\u0000q" },

    # Resize panes
    { key = "H",     mods = "Command",              chars = "\u0000H" },
    { key = "J",     mods = "Command",              chars = "\u0000J" },
    { key = "K",     mods = "Command",              chars = "\u0000K" },
    { key = "L",     mods = "Command",              chars = "\u0000L" },

    # Rename window
    { key = "R",     mods = "Command|Shift",         chars = "\u0000," },

    # Line navigation
    { key = "Left",  mods = "Command",              chars = "\u0001" },
    { key = "Right", mods = "Command",              chars = "\u0005" },

    # Window management
    { key = "N",     mods = "Command",              action = "ToggleFullscreen" },

    # Clipboard
    { key = "C",     mods = "Command",              action = "Copy" },
    { key = "V",     mods = "Command",              action = "Paste" },

    # Font size
    { key = "Plus",  mods = "Command",              action = "IncreaseFontSize" },
    { key = "Minus", mods = "Command",              action = "DecreaseFontSize" },
    { key = "Key0",  mods = "Command",              action = "ResetFontSize" },
]