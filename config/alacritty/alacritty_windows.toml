import = ["~/.config/alacritty/alacritty_common.toml"]

[terminal]
shell = { program = "wsl.exe", args = ["-d", "Ubuntu"] }

[keyboard]
bindings = [
    # Windows/WSL Keybindings usually follow Linux standards + Win key
    # Using Alt as the primary modifier.

    # Tmux splits (Prefix = Ctrl+Space = \x00)
    { key = "D",     mods = "Alt",              chars = "\u0000%" },
    { key = "D",     mods = "Alt|Shift",         chars = "\u0000\"" },

    # Pane/Window management
    { key = "W",     mods = "Alt",              chars = "\u0000x" },
    { key = "W",     mods = "Alt|Shift",         chars = "\u0000&" },
    { key = "Y",     mods = "Alt",              chars = "\u0000c" },

    # Tmux navigation
    { key = "P",     mods = "Alt",              chars = "\u0000w" },
    { key = "P",     mods = "Alt|Shift",         chars = "\u0000s" },
    { key = "O",     mods = "Alt",              chars = "\u0000q" },

    # Resize panes
    { key = "H",     mods = "Alt",              chars = "\u0000H" },
    { key = "J",     mods = "Alt",              chars = "\u0000J" },
    { key = "K",     mods = "Alt",              chars = "\u0000K" },
    { key = "L",     mods = "Alt",              chars = "\u0000L" },

    # Rename window
    { key = "R",     mods = "Alt|Shift",         chars = "\u0000," },

    # Line navigation
    { key = "Left",  mods = "Alt",              chars = "\u0001" },
    { key = "Right", mods = "Alt",              chars = "\u0005" },

    # Window management
    { key = "N",     mods = "Alt",              action = "ToggleFullscreen" },

    # Copy-mode & Log Grabber
    { key = "F",     mods = "Alt",              chars = "\u0000v" },
    { key = "G",     mods = "Alt",              chars = "\u0000g" },

    # Clipboard (Ctrl+Shift+C/V is standard on Linux/Windows terminals)
    { key = "C",     mods = "Control|Shift",     action = "Copy" },
    { key = "V",     mods = "Control|Shift",     action = "Paste" },

    # Font size
    { key = "Plus",  mods = "Control",          action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control",          action = "DecreaseFontSize" },
    { key = "Key0",  mods = "Control",          action = "ResetFontSize" },
]
