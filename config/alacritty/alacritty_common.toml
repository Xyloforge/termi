# ╔══════════════════════════════════════════════════════════════╗
# ║  Zenith Alacritty Config (Common)                           ║
# ╚══════════════════════════════════════════════════════════════╝

[general]
import = [
    "~/.config/alacritty/catppuccin-mocha.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding = { x = 14, y = 12 }
decorations = "buttonless"
opacity = 0.97
blur = false
option_as_alt = "Both"
startup_mode = "Maximized"

[font]
size = 19.0
normal  = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold    = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic  = { family = "JetBrainsMono Nerd Font", style = "Italic" }

[font.offset]
x = 0
y = 2

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600
blink_timeout = 0

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
    # Ctrl+Tab / Ctrl+Shift+Tab → cycle panes in tmux (Mapped to F13/F14)
    { key = "Tab",  mods = "Control",         chars = "\u001b[25~" }, # Sends F13
    { key = "Tab",  mods = "Control|Shift",   chars = "\u001b[26~" }, # Sends F14
]
