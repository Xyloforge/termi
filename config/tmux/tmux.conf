# ╔══════════════════════════════════════════════════════════════╗
# ║  Zenith Tmux — Ghost Dashboard                              ║
# ║                                                             ║
# ║  No pills. No shapes. No borders.                           ║
# ║  Just dim text that fades into the background.              ║
# ║  Look and it's there. Code and it's gone.                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ==========================
# TERMINAL & COLOR
# ==========================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ==========================
# PREFIX
# ==========================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ==========================
# GENERAL
# ==========================
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g status-position bottom
set -g status-interval 3
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display "  Config Reloaded"

# ==========================
# KEY BINDINGS
# ==========================
bind D split-window -v -c "#{pane_current_path}"
bind d split-window -h -c "#{pane_current_path}"
bind y new-window -c "#{pane_current_path}"

# Match Alacritty mappings
bind w kill-pane
bind W kill-window
bind p choose-tree -Zw
bind P choose-tree -Zs
bind o display-panes
bind R command-prompt -I "#W" "rename-window '%%'"
bind N previous-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Cycle panes: Ctrl+Tab / Ctrl+Shift+Tab (via Alacritty → Prefix+Tab / Prefix+T)
bind Tab select-pane -t :.+
bind T   select-pane -t :.-

# Auto-Resize Mode (Prefix + a)
# Automatically zooms small panes when focused. When leaving to a larger pane, it unzooms.
bind a if-shell -F '#{@auto_resize}' \
    'set-option -g @auto_resize 0 ; set-hook -ug pane-focus-in ; set-hook -ug pane-focus-out ; display-message "  Auto Zoom: OFF"' \
    'set-option -g @auto_resize 1 ; set-hook -g pane-focus-out "run-shell \"~/.config/tmux/auto_resize.sh out\"" ; set-hook -g pane-focus-in "run-shell \"~/.config/tmux/auto_resize.sh in\"" ; display-message "  Auto Zoom: ON"'

# ==========================
# PANE BORDERS
# ==========================
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#45475A"

# ==========================
# COPY MODE — Vim-Style Selection
# ==========================
set-window-option -g mode-keys vi

# Prefix + v: Enter copy-mode (mnemonic: vim)
bind v copy-mode

# Vi-style selection bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# Yank to clipboard + show preview popup (press q to close)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '~/.config/tmux/yank_preview.sh'

# Mouse drag → silent copy to clipboard (no popup)
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# ==========================
# LOG GRABBER (Prefix + g)
# ==========================
# Opens fzf popup over scrollback — multi-select lines, copies to clipboard
bind g display-popup -E -w 80% -h 90% "~/.config/tmux/log_grabber.sh"

# ==========================
# STATUS BAR — Ghost Dashboard
# ==========================
# Everything is dim gray (#585B70 / #6C7086) on the same
# background. No boxes. No pills. No shapes. Just text.
# The only exception: active window gets a gentle nudge of color.

set -g status-style "bg=#11111B,fg=#585B70"

# ── Left: Session name ──
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[fg=#fab387 bold]  COMMAND ,#[fg=#6C7086]  #S }  "

# ── Center: Window Tabs ──
# Inactive: ghost gray — same as status bar, nearly invisible
set -g window-status-format "#[fg=#45475A]  #I·#W "

# Active: just slightly brighter — a gentle whisper, not a shout
set -g window-status-current-format "#[fg=#BAC2DE,bold]  #I·#W "

set -g window-status-separator ""

# ── Right: System Info — all dim, same gray family ──
set -g status-right-length 80
set -g status-right "#[fg=#585B70]  #{cpu_percentage}   #{ram_percentage}  #(df -h / | awk 'NR==2{print $5}')  #{battery_icon} #{battery_percentage}    %H:%M  "

# Message & Mode
set -g message-style "fg=#F9E2AF,bg=#11111B,bold"
set -g message-command-style "fg=#94E2D5,bg=#11111B"
set -g mode-style "fg=#11111B,bg=#B4BEFE"

# ==========================
# PLUGINS
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'

set -g @cpu_percentage_format "%2.0f%%"
set -g @ram_percentage_format "%2.0f%%"

set -g @batt_icon_charge_tier8 ''
set -g @batt_icon_charge_tier7 ''
set -g @batt_icon_charge_tier6 ''
set -g @batt_icon_charge_tier5 ''
set -g @batt_icon_charge_tier4 ''
set -g @batt_icon_charge_tier3 ''
set -g @batt_icon_charge_tier2 ''
set -g @batt_icon_charge_tier1 ''
set -g @batt_icon_status_charged ''
set -g @batt_icon_status_charging ''

# Google Search (Prefix + G) -> Opens in default browser
# MacOS: open, Linux: xdg-open
if-shell "uname | grep -q Darwin" \
    "bind-key G command-prompt -p '🔍 Google:' \"run-shell 'open \\\"https://www.google.com/search?q=%1\\\"'\"" \
    "bind-key G command-prompt -p '🔍 Google:' \"run-shell 'xdg-open \\\"https://www.google.com/search?q=%1\\\"'\""

# ==========================
# WINDOW FINDER (Cmd+P style)
# ==========================
# Prefix + f: Fuzzy search all windows by name and current path
bind f display-popup -E -w 60% -h 50% \
    "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name} #{pane_current_path}' | \
     fzf --prompt='  ' \
         --header='Switch Window' \
         --layout=reverse \
         --border=none \
         --color='bg+:#313244,fg+:#CDD6F4,hl:#F38BA8,hl+:#F38BA8,pointer:#CBA6F7,prompt:#CBA6F7,header:#585B70' \
         --with-nth=1,2,3 \
         --delimiter=' ' | \
     awk '{print \$1}' | \
     xargs -I{} tmux switch-client -t '{}'"

# ==========================
# POPUP TERMINAL (Modal)
# ==========================
# Prefix + P: Opens a floating popup window (80% width/height)
# You can run any command here (git, htop, quick edits).
# Press Ctrl+D or type 'exit' to close it.
bind P display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"

# ==========================
# ZOOM / FOCUS
# ==========================
# Prefix+z → zoom toggle (built-in)
# Cmd+Z (via Alacritty → Prefix+z) → same zoom toggle
# Ensure Escape is never intercepted (needed for zsh vi-mode)
unbind -T root Escape

# Init TPM (MUST be last line)
run '~/.tmux/plugins/tpm/tpm'