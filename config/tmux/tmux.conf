# ╔══════════════════════════════════════════════════════════════╗
# ║  Zenith Tmux — Ghost Dashboard                              ║
# ║                                                             ║
# ║  No pills. No shapes. No borders.                           ║
# ║  Just dim text that fades into the background.              ║
# ║  Look and it's there. Code and it's gone.                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ==========================
# TERMINAL & COLOR
# ==========================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ==========================
# PREFIX
# ==========================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ==========================
# GENERAL
# ==========================
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g status-position bottom
set -g status-interval 3
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display "  Config Reloaded"

# ==========================
# KEY BINDINGS
# ==========================
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==========================
# PANE BORDERS
# ==========================
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#45475A"

# ==========================
# STATUS BAR — Ghost Dashboard
# ==========================
# Everything is dim gray (#585B70 / #6C7086) on the same
# background. No boxes. No pills. No shapes. Just text.
# The only exception: active window gets a gentle nudge of color.

set -g status-style "bg=#11111B,fg=#585B70"

# ── Left: Session name ──
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[fg=#fab387 bold]  COMMAND ,#[fg=#6C7086]  #S }  "

# ── Center: Window Tabs ──
# Inactive: ghost gray — same as status bar, nearly invisible
set -g window-status-format "#[fg=#45475A]  #I·#W "

# Active: just slightly brighter — a gentle whisper, not a shout
set -g window-status-current-format "#[fg=#BAC2DE,bold]  #I·#W "

set -g window-status-separator ""

# ── Right: System Info — all dim, same gray family ──
set -g status-right-length 80
set -g status-right "#[fg=#585B70]  #{cpu_percentage}   #{ram_percentage}  #{battery_icon} #{battery_percentage}    %H:%M  "

# Message & Mode
set -g message-style "fg=#F9E2AF,bg=#11111B,bold"
set -g message-command-style "fg=#94E2D5,bg=#11111B"
set -g mode-style "fg=#11111B,bg=#B4BEFE"

# ==========================
# PLUGINS
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'

set -g @cpu_percentage_format "%2.0f%%"
set -g @ram_percentage_format "%2.0f%%"

set -g @batt_icon_charge_tier8 ''
set -g @batt_icon_charge_tier7 ''
set -g @batt_icon_charge_tier6 ''
set -g @batt_icon_charge_tier5 ''
set -g @batt_icon_charge_tier4 ''
set -g @batt_icon_charge_tier3 ''
set -g @batt_icon_charge_tier2 ''
set -g @batt_icon_charge_tier1 ''
set -g @batt_icon_status_charged ''
set -g @batt_icon_status_charging ''

# Google Search (Prefix + G) -> Opens in default browser
# MacOS: open, Linux: xdg-open
if-shell "uname | grep -q Darwin" \
    "bind-key G command-prompt -p '🔍 Google:' \"run-shell 'open \\\"https://www.google.com/search?q=%1\\\"'\"" \
    "bind-key G command-prompt -p '🔍 Google:' \"run-shell 'xdg-open \\\"https://www.google.com/search?q=%1\\\"'\""

# ==========================
# POPUP TERMINAL (Modal)
# ==========================
# Prefix + P: Opens a floating popup window (80% width/height)
# You can run any command here (git, htop, quick edits).
# Press Ctrl+D or type 'exit' to close it.
bind P display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"

# Init TPM (MUST be last line)
run '~/.tmux/plugins/tpm/tpm'